<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

       body{
      font-family: Arial;
      }

    .subscribe-button{
      background-color: black;
      color: white;
      padding-top: 10px ;
      padding-left: 15px;
      padding-bottom: 10px;
      padding-right: 15px;
      border-radius: 50px;
      font-weight:bold;
      cursor: pointer;
      margin-bottom: 30px;
    }

    .is-subscribed{
      background-color: rgb(240,240,240);
      color: black;
    }

    .calculateButton{
      font-weight: 10px;
      color: white;
      background-color:green ;
     padding-top: 12px ;
      padding-left: 17px;
      padding-bottom: 12px;
      padding-right: 17px;
      border: none;
      cursor: pointer;
    }

    input{
       padding-top: 10px ;
      padding-left: 15px;
      padding-bottom: 10px;
      padding-right: 15px;
    }


  </style>
</head>
<body>
  <p> YouTube Suiiscribe Button</p>
  <button onclick="
    subscribe();
   " class="js-btn  subscribe-button"> subscribe</button>

   <p>Amazon Shipping calculator</p>
   <p >Order under $40 = +$10 shipping.  </p>
   <p>Order over $40 = FREE shipping.  </p>

   <input type="text" placeholder="Cost of Order"  class="js-cost-input" onkeydown="
   if(event.key === 'Enter'){
     calculateTotal();
   }
   "> 

      <button onclick="
   calculateTotal();
   " class="calculateButton" > Calculate </button>

   <p class="js-total-cost"></p>

  <script>
    function calculateTotal(){
      const inputElement = document.querySelector('.js-cost-input');
      //  let cost =JSON.parse(inputElement.value);  //20
       //or 
          let cost =Number((inputElement.value));


       if(cost < 40){
        cost = cost +10;
       }
       const totalCost = document.querySelector('.js-total-cost').innerHTML=`$${cost}`;
    }

    
   function subscribe(){
  const jsSubscribeButton = document.querySelector('.js-btn');

   if(jsSubscribeButton.innerText==='subscribe'){
       jsSubscribeButton.innerHTML='subscribed';
       jsSubscribeButton.classList.add('is-subscribed');
   } else {
       jsSubscribeButton.innerHTML='subscribe';
       jsSubscribeButton.classList.remove('is-subscribed');
   }
   }
  </script>
</body>
</html>
