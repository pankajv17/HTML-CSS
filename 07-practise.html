  function convertToLength(length,from,to){
   if (from === 'km' && to === 'miles'){
      return `${length/1.6}miles`;
   }else if(from === 'miles' && to === 'km'){
     return `${length*1.6}km`;
   }else if(from === to){
     return `${length} ${to} `;
   }
  }

  console.log(convertToLength(50,'miles','km'));
  console.log(convertToLength(30,'km','miles'));
  console.log(convertToLength(50,'km','km'));
