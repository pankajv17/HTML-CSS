<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="10-rock-paper-scissors.css">
</head>
<body>

  <p class="title">Rock Paper Scissors</p>
      
 <button class="move-button" onclick="
    const randomNumber= Math.random();

    playerGame('rock');
     pickComputerMove();
      
  "><img src="images/rock-emoji.png" alt="Rock" 
  class="move-icon"></button>

  <button class="move-button" onclick="
    pickComputerMove();
     playerGame('paper');

  " ><img 
  src="images/paper-emoji.png" alt="paper" class="move-icon"></button>

  <button class="move-button"
  onclick=" 
    playerGame('scissors');
     pickComputerMove();
  "><img src="images/scissors-emoji.png" alt="scissors" class="move-icon"></button>

   <p class="js-result result">you Win</p>
   <p class="js-move"> You
     <img src="images/rock-emoji.png" alt="rock" class="move-icon">
     <img src="images/paper-emoji.png "alt="rock" class="move-icon">
     Computer
  </p>
  <p class="js-score score"></p>

  <button onclick="
    score.wins=0;
    score.losses=0;
    score.ties=0;
    localStorage.removeItem('score');
    updateScoreElement();
  " class="resetScore reset-score-button"> Reset Score</button>

<script src="10.rock.paper.scissors.js"></script>
</body>
</html>
