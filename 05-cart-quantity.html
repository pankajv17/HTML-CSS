  <title>Cart</title>
</head>
<body>
  <p> Cart Quantity</p>
  <button onclick="console.log(`cart Quantity: ${CartQuantity} `);"> 
    Show Quantity </button>

   <button onclick="
   CartQuantity ++;
   console.log(`CartQuantity : ${CartQuantity }`)">
     Add to Cart </button> 

   <button onclick="
   CartQuantity +=2;
   console.log(`CartQuantity : ${CartQuantity }`)"> 
    +2</button> 

   <button onclick="
   CartQuantity = CartQuantity + 3;
   console.log(`CartQuantity : ${CartQuantity}`)"> +3</button> 

      <button onclick="
   CartQuantity +=4;
   console.log(`CartQuantity : ${CartQuantity}`)"> +4</button> 

      <button onclick="
   CartQuantity = CartQuantity + 5;
   console.log(`CartQuantity : ${CartQuantity}`)"> +5</button> 

   <button onclick="
   CartQuantity = 0;
   console.log('Reset Cart Quantity')
   console.log(`cartQuantity : ${CartQuantity}`)
   "> Reset Cart</button> 

 

  <script>
    let CartQuantity = 0;

  </script>
</body>
</html>
